<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas {
        display: block;
      }
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 16px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        z-index: 10;
        pointer-events: none;
      }
      #hud > div {
        pointer-events: auto;
      }
      .hud-section {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .hud-item {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .hud-label {
        font-size: 10px;
        opacity: 0.6;
        text-transform: uppercase;
      }
      .hud-value {
        font-size: 18px;
        font-weight: 600;
      }
      .rating-S {
        color: #ffd700;
      }
      .rating-A {
        color: #00ff88;
      }
      .rating-B {
        color: #4488ff;
      }
      .rating-C {
        color: #ff8844;
      }
      .rating-D {
        color: #ff4444;
      }
      .rating-F {
        color: #ff0000;
      }
      #toolbar {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 8px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.8);
        z-index: 10;
      }
      .tool-btn {
        width: 48px;
        height: 48px;
        border: 2px solid #333;
        border-radius: 8px;
        background: #222;
        color: #fff;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .tool-btn:hover {
        border-color: #4488ff;
        background: #333;
      }
      .tool-btn.active {
        border-color: #00ff88;
        background: #1a3a2a;
      }
      .tool-btn .label {
        font-size: 9px;
        position: absolute;
        bottom: 2px;
      }
      #event-panel {
        position: absolute;
        top: 60px;
        right: 16px;
        width: 240px;
        z-index: 10;
      }
      .event-card {
        background: rgba(0, 0, 0, 0.8);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
        border-left: 3px solid #ff8844;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 12px;
      }
      .event-card.active {
        border-left-color: #ff4444;
      }
      .event-card .event-type {
        font-weight: 600;
        font-size: 14px;
      }
      .event-card .event-timer {
        opacity: 0.6;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        color: #fff;
        font-family: system-ui;
        font-size: 24px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="loading">Connecting...</div>
      <div id="hud" style="display: none">
        <div class="hud-section">
          <div class="hud-item">
            <span class="hud-label">Rating</span>
            <span class="hud-value" id="hud-rating">B</span>
          </div>
          <div class="hud-item">
            <span class="hud-label">Score</span>
            <span class="hud-value" id="hud-score">0.80</span>
          </div>
        </div>
        <div class="hud-section">
          <div class="hud-item">
            <span class="hud-label">Vehicles</span>
            <span class="hud-value" id="hud-vehicles">0</span>
          </div>
          <div class="hud-item">
            <span class="hud-label">Weather</span>
            <span class="hud-value" id="hud-weather">☀️</span>
          </div>
          <div class="hud-item">
            <span class="hud-label">Season</span>
            <span class="hud-value" id="hud-season">Spring</span>
          </div>
        </div>
        <div class="hud-section">
          <div class="hud-item">
            <span class="hud-label">Road Points</span>
            <span class="hud-value" id="hud-rp">0</span>
          </div>
          <div class="hud-item">
            <span class="hud-label">Blueprints</span>
            <span class="hud-value" id="hud-bt">0</span>
          </div>
        </div>
      </div>
      <div id="toolbar" style="display: none">
        <button class="tool-btn" data-tool="select" title="Select">🖱️</button>
        <button class="tool-btn" data-tool="road" title="Build Road">🛣️</button>
        <button class="tool-btn" data-tool="signal" title="Place Signal">
          🚦
        </button>
        <button class="tool-btn" data-tool="demolish" title="Demolish">
          🗑️
        </button>
      </div>
      <div id="event-panel"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
